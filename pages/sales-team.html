<div id="page-sales-team" class="page hidden">

  <header class="topbar">
    <div>
      <h1>Sales Team</h1>
      <p class="subtitle">
        <span id="sales-team-meta-source">loading…</span>
        <span class="dot"></span>
        <span id="sales-team-meta-count">—</span>
      </p>
    </div>
    <div class="topbar-right">
      <input type="file" id="sp-upload-input" accept=".xlsx,.xls" hidden />
      <button id="sp-upload-btn" class="upload-btn" type="button"
              title="Upload customer → salesperson mapping (full replace)">
        <span class="upload-icon">&uarr;</span> Upload Salesperson Map
      </button>
    </div>
  </header>

  <section class="sales-team-scroll">

    <nav class="sales-team-crumbs" id="sales-team-crumbs"></nav>

    <div class="analysis-controls">
      <label>Sale Type
        <select id="st-sale-group">
          <option value="">All</option>
          <option value="domestic">Domestic</option>
          <option value="export">Export</option>
          <option value="other">Other</option>
        </select>
      </label>
      <label>Material
        <select id="st-material">
          <option value="">All</option>
          <option value="fg">Finished Goods</option>
          <option value="rm">Raw Material</option>
        </select>
      </label>
      <label>Month
        <select id="st-month"><option value="">All</option></select>
      </label>
      <label>From
        <input id="st-date-from" type="date" />
      </label>
      <label>To
        <input id="st-date-to" type="date" />
      </label>
      <label>Search
        <input id="st-q" type="search" placeholder="contains..." />
      </label>
      <button id="st-reset" type="button">Reset</button>
    </div>

    <div class="insight-grid" id="st-kpi-strip"></div>

    <div class="sales-person-card-grid" id="st-person-cards"></div>
    <div class="sales-person-card-grid sales-person-only hidden" id="st-performance-cards"></div>

    <div class="dashboard-grid sales-team-charts">
      <section class="dashboard-panel">
        <div class="panel-head">
          <h2 id="st-sales-chart-title">Sales By Person</h2>
          <span id="st-sales-chart-note">—</span>
        </div>
        <div class="chart-box sales-team-chart-box"><canvas id="st-sales-chart"></canvas></div>
      </section>

      <section class="dashboard-panel">
        <div class="panel-head">
          <h2 id="st-coverage-chart-title">Coverage</h2>
          <span id="st-coverage-chart-note">—</span>
        </div>
        <div class="chart-box sales-team-chart-box"><canvas id="st-coverage-chart"></canvas></div>
      </section>

      <section class="dashboard-panel sales-person-only hidden" id="st-mix-panel">
        <div class="panel-head">
          <h2>Sales Mix Weight</h2>
          <span id="st-mix-chart-note">—</span>
        </div>
        <div class="chart-box sales-team-chart-box"><canvas id="st-mix-chart"></canvas></div>
      </section>

      <section class="dashboard-panel sales-person-only hidden" id="st-band-panel">
        <div class="panel-head">
          <h2>Invoice Value Bands</h2>
          <span id="st-band-chart-note">—</span>
        </div>
        <div class="chart-box sales-team-chart-box"><canvas id="st-band-chart"></canvas></div>
      </section>
    </div>

    <section class="dashboard-panel full-width" id="st-table-panel">
      <div class="panel-head">
        <h2 id="st-panel-title">Sales Team</h2>
        <span id="st-panel-count">—</span>
      </div>
      <div class="pivot-table-wrap">
        <table class="pivot-table" id="st-table"></table>
      </div>
    </section>

  </section>

</div>
